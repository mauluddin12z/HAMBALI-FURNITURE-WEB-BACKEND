name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            bash -lc '
              set -e

              APP_NAME="${{ github.event.repository.name }}"
              APP_DIR="/var/www/apps/$APP_NAME"

              echo "Deploying $APP_NAME to $APP_DIR"

              mkdir -p /var/www/apps

              # Clone if missing
              if [ ! -d "$APP_DIR/.git" ]; then
                git clone git@github.com:${{ github.repository }}.git "$APP_DIR"
              fi

              cd "$APP_DIR"

              echo "Syncing repository..."
              git fetch origin
              git reset --hard origin/main
              git clean -fd

              echo "Loading NVM..."
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              nvm use 20

              echo "Installing dependencies..."
              npm ci --omit=dev

              echo "Ensuring PM2 is installed..."
              if ! command -v pm2 >/dev/null 2>&1; then
                npm install -g pm2
              fi

              echo "Starting/Reloading app..."
              if pm2 list | grep -q "$APP_NAME"; then
                pm2 reload ecosystem.config.cjs --update-env
              else
                pm2 start ecosystem.config.cjs --name "$APP_NAME"
              fi

              pm2 save

              echo "Deployment completed"
            '
